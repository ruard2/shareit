name: spullen_delen
description: Een app om spullen te delen binnen een gemeenschap
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:        # ← required for MaterialLocalizations (NL/EN)
    sdk: flutter
  intl: ^0.19.0                 # ← optional but recommended

  shared_preferences: ^2.2.2
  image_picker: ^1.0.4
  provider: ^6.1.1
  firebase_messaging: ^15.0.4

  firebase_core: ^3.4.0
  flutter_app_badger: ^1.2.0
  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  font_awesome_flutter: ^10.7.0
  flutter_local_notifications: ^17.2.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/quotes.txt
